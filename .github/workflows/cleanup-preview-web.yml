name: Cleanup Preview Web

on:
  schedule:
    # Runs at 03:00 UTC on the first day of every month
    - cron: '0 3 1 * *'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  list-prs:
    runs-on: ubuntu-latest
    outputs:
      pr_numbers: ${{ steps.collect.outputs.pr_numbers }}
      pr_count: ${{ steps.collect.outputs.pr_count }}
    steps:
      - name: Collect PR numbers
        id: collect
        uses: actions/github-script@v8
        with:
          script: |
            const pulls = await github.paginate(github.rest.pulls.list, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'all',
              per_page: 100
            });

            const prNumbers = [...new Set(pulls.map((pr) => pr.number))];
            core.setOutput('pr_numbers', JSON.stringify(prNumbers));
            core.setOutput('pr_count', prNumbers.length.toString());

  delete:
    needs: list-prs
    if: needs.list-prs.outputs.pr_count != '0'
    runs-on: ubuntu-latest
    name: Delete Preview PR Deployments
    strategy:
      fail-fast: false
      matrix:
        pr_number: ${{ fromJson(needs.list-prs.outputs.pr_numbers) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Delete Worker
        uses: cloudflare/wrangler-action@v3
        continue-on-error: true
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          command: delete --name viajes-veleta-web-pr-${{ matrix.pr_number }}
