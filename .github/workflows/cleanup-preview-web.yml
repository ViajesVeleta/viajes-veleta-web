name: Cleanup Preview Web

on:
  pull_request:
    types: [closed]
    branches:
      - main
  schedule:
    # At 03:00 UTC on the first day of each month
    - cron: '0 3 1 * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  delete:
    runs-on: ubuntu-latest
    name: Delete Preview
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Delete Worker
        uses: cloudflare/wrangler-action@v3
        continue-on-error: true
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          command: delete --name viajes-veleta-web-pr-${{ github.event.number }}

      - name: Add Job Summary
        run: |
          echo "## 🗑️ Preview Cleanup Successful" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "The preview environment for PR #${{ github.event.number }} has been successfully removed from Cloudflare Workers." >> $GITHUB_STEP_SUMMARY
          echo "**Status:** 🛑 Deleted" >> $GITHUB_STEP_SUMMARY

  delete-pr-deployments:
    runs-on: ubuntu-latest
    name: Delete PR Deployments (Monthly/Manual)
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Delete all PR preview workers
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # Worker names matching this pattern are considered PR preview deployments
          PR_WORKER_PATTERN: -pr-
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ] || [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "Missing required Cloudflare secrets (CLOUDFLARE_API_TOKEN / CLOUDFLARE_ACCOUNT_ID)." >&2
            exit 1
          fi

          API_BASE="https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID"
          LIST_RESPONSE=$(curl -sS \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            -H "Content-Type: application/json" \
            "$API_BASE/workers/scripts")

          if ! echo "$LIST_RESPONSE" | jq -e '.success == true' >/dev/null; then
            echo "Failed to list Cloudflare workers." >&2
            echo "$LIST_RESPONSE" | jq -c '.errors // []' >&2
            exit 1
          fi

          SCRIPTS=$(echo "$LIST_RESPONSE" | jq -r --arg pattern "$PR_WORKER_PATTERN" '.result[].id | select(contains($pattern))')

          if [ -z "$SCRIPTS" ]; then
            echo "No PR preview workers found."
            echo "## 🧹 Monthly/Manual PR Cleanup" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "No PR preview workers were found to delete." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          DELETED=0
          FAILED=0
          while IFS= read -r script; do
            [ -z "$script" ] && continue
            echo "Deleting worker: $script"
            DELETE_RESPONSE=$(curl -sS -X DELETE \
              -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
              "$API_BASE/workers/scripts/$script")

            if ! echo "$DELETE_RESPONSE" | jq -e '.success == true' >/dev/null; then
              echo "Failed deleting worker: $script" >&2
              echo "$DELETE_RESPONSE" | jq -c '.errors // []' >&2
              FAILED=$((FAILED + 1))
              continue
            fi

            DELETED=$((DELETED + 1))
          done <<< "$SCRIPTS"

          echo "## 🧹 Monthly/Manual PR Cleanup" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Deleted $DELETED PR preview worker(s)." >> "$GITHUB_STEP_SUMMARY"

          if [ "$FAILED" -gt 0 ]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "$FAILED worker(s) could not be deleted. Check logs for details." >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi
