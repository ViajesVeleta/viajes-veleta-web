name: PR Image Optimization

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  optimize:
    runs-on: ubuntu-latest
    # Prevent infinite loop
    if: github.actor != 'github-actions[bot]'
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Install webp and imagemagick (cached)
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: webp imagemagick
          version: 1.0

      - name: Run Optimization Script
        id: optimize
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          chmod +x .github/scripts/optimize-images.sh
          .github/scripts/optimize-images.sh

      - name: Commit and Push
        if: steps.optimize.outputs.has_changes == 'true'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "chore: optimize images [skip ci]"
          git push

      - name: Comment on PR
        if: steps.optimize.outputs.has_changes == 'true'
        uses: actions/github-script@v8
        env:
          SUMMARY: ${{ steps.optimize.outputs.summary }}
          TOTAL_SRC_KB: ${{ steps.optimize.outputs.total_src_kb }}
          TOTAL_DEST_KB: ${{ steps.optimize.outputs.total_dest_kb }}
          TOTAL_SAVED_KB: ${{ steps.optimize.outputs.total_saved_kb }}
        with:
          script: |
            const summary = process.env.SUMMARY;
            const author = '${{ github.event.pull_request.user.login }}';
            const srcKb = parseInt(process.env.TOTAL_SRC_KB);
            const destKb = parseInt(process.env.TOTAL_DEST_KB);
            const savedKb = parseInt(process.env.TOTAL_SAVED_KB);
            const toMb = kb => (kb / 1024).toFixed(2);
            const table = [
              `| | Size |`,
              `| --- | --- |`,
              `| **Original** | ${srcKb} KB (${toMb(srcKb)} MB) |`,
              `| **Optimized** | ${destKb} KB (${toMb(destKb)} MB) |`,
              `| **Saved** | ${savedKb} KB (${toMb(savedKb)} MB) |`,
            ].join('\n');
            const body = `# Image Optimization Report\n\n${table}\n\n## Detailed images optimization\n\n${summary}\n\n@${author} I have pushed a new commit with optimized images. Please pull the changes before making new commits!`;
            
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
